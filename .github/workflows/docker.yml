name: Docker

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t go-accounting-api .

      - name: Run container (smoke test)
        run: |
          docker rm -f test-api || true
          docker run -d -p 8080:8080 --name test-api go-accounting-api
          for i in {1..20}; do
            if curl --fail http://localhost:8080/api/v1/health; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API..."
            sleep 3
          done