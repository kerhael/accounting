name: Docker CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t go-accounting-api .

      - name: Run database migrations
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..20}; do
            if pg_isready -h localhost -p 5432 -U testuser; then
              break
            fi
            echo "Waiting for Postgres..."
            sleep 3
          done
          echo "✅ PostgreSQL ready"

          echo "Running migrations using migrate/migrate..."
          docker run --rm \
            -v ${{ github.workspace }}/migrations:/migrations \
            --network host \
            -e PGPASSWORD=testpass \
            migrate/migrate \
            -path /migrations \
            -database "postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable" \
            up

      - name: Run container (smoke test)
        run: |
          docker rm -f test-api || true
          docker run -d -p 8080:8080 \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_USER=testuser \
            -e DB_PASSWORD=testpass \
            -e DB_NAME=testdb \
            -e DB_SSLMODE=disable \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --name test-api go-accounting-api

      - name: Wait for API to be healthy
        run: |
          echo "⏳ Waiting for API to respond on /api/v1/health..."
          timeout=60
          elapsed=0
          interval=3
          until curl --fail http://localhost:8080/api/v1/health >/dev/null 2>&1; do
            sleep $interval
            elapsed=$((elapsed + interval))
            if [ $elapsed -ge $timeout ]; then
              echo "❌ API did not become healthy within $timeout seconds"
              docker logs test-api
              docker rm -f test-api
              exit 1
            fi
            echo "Waiting... ($elapsed/$timeout)"
          done
          echo "✅ API is healthy!"

      - name: Cleanup container
        run: docker rm -f test-api