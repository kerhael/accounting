name: Docker

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t go-accounting-api .

      - name: Run container (smoke test)
        run: |
          docker rm -f test-api || true
          docker run -d -p 8080:8080 \
          -e DB_HOST=${{ secrets.DB_HOST }} \
          -e DB_PORT=${{ secrets.DB_PORT }} \
          -e DB_USER=${{ secrets.DB_USER }} \
          -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
          -e DB_NAME=${{ secrets.DB_NAME }} \
          -e DB_SSLMODE=${{ secrets.DB_SSLMODE }} \
          -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
          --name test-api go-accounting-api

      - name: Wait for API to be healthy
        run: |
          echo "⏳ Waiting for API to respond on /api/v1/health..."
          # Timeout après 60 secondes
          timeout=60
          elapsed=0
          interval=3

          until curl --fail http://localhost:8080/api/v1/health >/dev/null 2>&1; do
            sleep $interval
            elapsed=$((elapsed + interval))
            if [ $elapsed -ge $timeout ]; then
              echo "❌ API did not become healthy within $timeout seconds"
              docker logs test-api
              docker rm -f test-api
              exit 1
            fi
            echo "Waiting... ($elapsed/$timeout)"
          done

          echo "✅ API is healthy!"

      - name: Cleanup container
        run: |
          docker rm -f test-api